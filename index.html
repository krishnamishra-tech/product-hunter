<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Volkrion Product Hunter</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          teal: { DEFAULT: "#0F766E", dark: "#0B5A54", light: "#14B8A6" },
          gold: { DEFAULT: "#D4A017", light: "#F0C349" },
          ink: "#1A2421",
        },
      },
    },
  };
</script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
  body { font-family:'Poppins',sans-serif; background:#F7FAF9; }
  .font-display { font-family:'Playfair Display',serif; }
</style>
</head>
<body class="text-ink">

<!-- ============ CONFIG ============ -->
<script>
  const SUPABASE_URL = "https://pudykccolzvhgoykbwiy.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_vmYhkVvoB16bumLFnx5oBQ_l8Q5auH4";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>
<!-- ================================= -->

<header class="bg-teal text-white">
  <div class="mx-auto max-w-5xl px-5 py-6">
    <h1 class="font-display text-2xl font-bold">Volkrion Product Hunter</h1>
    <p class="text-white/70 text-sm mt-1">Ek search mein trending products dhoondo, apni niche ke liye</p>
  </div>
</header>

<main class="mx-auto max-w-5xl px-5 py-8">
  <div class="flex flex-col sm:flex-row gap-3 mb-8">
    <input id="niche-input" type="text" placeholder="e.g. kitchen gadgets, pet accessories, home decor..."
      class="flex-1 rounded-full border border-teal/20 px-6 py-3 focus:border-teal focus:outline-none" />
    <button id="search-btn" onclick="findProducts()"
      class="rounded-full bg-gold px-8 py-3 font-semibold text-ink hover:bg-gold-light transition-colors whitespace-nowrap">
      🔍 Find Products
    </button>
  </div>

  <div id="status" class="hidden text-center py-8 text-ink/50"></div>

  <div id="results" class="grid sm:grid-cols-2 gap-4 mb-12"></div>

  <div class="border-t border-teal/10 pt-8">
    <h2 class="font-display text-xl font-bold mb-4">Saved Products</h2>
    <div id="saved-list" class="grid sm:grid-cols-2 gap-4"></div>
  </div>
</main>

<script>
async function findProducts() {
  const niche = document.getElementById("niche-input").value.trim();
  if (!niche) return;

  const status = document.getElementById("status");
  const results = document.getElementById("results");
  const btn = document.getElementById("search-btn");

  btn.disabled = true;
  btn.textContent = "Searching...";
  status.classList.remove("hidden");
  status.textContent = "Web search kar raha hoon — 10-20 second lagenge...";
  results.innerHTML = "";

  try {
    const res = await fetch("/api/find-products", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ niche }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Search failed");

    status.classList.add("hidden");
    results.innerHTML = data.products.map((p, i) => productCard(p, niche, i)).join("");
  } catch (err) {
    status.textContent = "Error: " + err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "🔍 Find Products";
  }
}

function productCard(p, niche, idx) {
  const encoded = encodeURIComponent(JSON.stringify(p));
  return `
    <div class="rounded-2xl border border-teal/10 bg-white p-5">
      <h3 class="font-display font-bold text-lg text-teal-dark">${p.name}</h3>
      <p class="text-sm text-ink/70 mt-2">${p.reason || ""}</p>
      <div class="mt-3 flex flex-wrap gap-2 text-xs">
        <span class="rounded-full bg-gold/20 text-gold px-3 py-1 font-semibold">${p.price_band || "N/A"}</span>
      </div>
      <p class="text-xs text-ink/50 mt-3">💡 ${p.content_angle || ""}</p>
      <p class="text-xs text-ink/40 mt-1">Source: ${p.source_note || "web search"}</p>
      <button onclick='saveProduct(${JSON.stringify(niche)}, ${JSON.stringify(p)}, this)'
        class="mt-4 w-full rounded-full border border-teal text-teal text-sm font-semibold py-2 hover:bg-teal hover:text-white transition-colors">
        + Save Product
      </button>
    </div>`;
}

async function saveProduct(niche, product, btnEl) {
  btnEl.disabled = true;
  btnEl.textContent = "Saving...";
  try {
    const res = await fetch("/api/save-product", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ niche, product }),
    });
    if (!res.ok) throw new Error("Save failed");
    btnEl.textContent = "Saved ✓";
    btnEl.classList.add("bg-teal", "text-white");
    loadSaved();
  } catch (err) {
    btnEl.textContent = "Error, retry";
    btnEl.disabled = false;
  }
}

async function loadSaved() {
  const { data, error } = await supabaseClient
    .from("product_finds")
    .select("*")
    .order("created_at", { ascending: false })
    .limit(20);

  const list = document.getElementById("saved-list");
  if (error || !data?.length) {
    list.innerHTML = `<p class="text-ink/40 text-sm col-span-full">Koi saved product nahi hai abhi.</p>`;
    return;
  }
  list.innerHTML = data.map(p => `
    <div class="rounded-xl border border-teal/10 bg-white p-4 flex justify-between items-start gap-3">
      <div>
        <h4 class="font-semibold text-teal-dark">${p.name}</h4>
        <p class="text-xs text-ink/50 mt-1">${p.niche} · ${p.price_band || ""}</p>
      </div>
      <button onclick="deleteProduct('${p.id}')" class="text-ink/30 hover:text-red-500 text-sm">✕</button>
    </div>`).join("");
}

async function deleteProduct(id) {
  await supabaseClient.from("product_finds").delete().eq("id", id);
  loadSaved();
}

document.getElementById("niche-input").addEventListener("keypress", (e) => {
  if (e.key === "Enter") findProducts();
});

window.addEventListener("DOMContentLoaded", loadSaved);
</script>
</body>
</html>
